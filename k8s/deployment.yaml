apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cicd-app
  template:
    metadata:
      labels:
        app: cicd-app
    spec:
      containers:
        - name: app
          image: krishna20047/cicd-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-credentials
                  key: USERNAME

            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-credentials
                  key: PASSWORD